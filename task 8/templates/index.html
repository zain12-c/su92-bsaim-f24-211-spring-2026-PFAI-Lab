<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Random Joke App</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 50px; 
            background-color: #f0f8ff;
        }
        h1 { color: #333; }
        #joke { 
            margin: 20px auto; 
            font-size: 1.2em; 
            color: darkblue; 
            width: 60%;
            padding: 15px;
            border: 2px solid #ccc;
            border-radius: 10px;
            background-color: #fff;
        }
        button { 
            padding: 10px 20px; 
            font-size: 1em; 
            cursor: pointer; 
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
        }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <h1>Welcome to My Joke App!</h1>
    <button onclick="getJoke()">Get Random Joke</button>
    <div id="joke">Loading joke...</div>

    <script>
        // Function to fetch joke from backend
        async function getJoke() {
            document.getElementById('joke').innerHTML = "Loading...";
            try {
                const response = await fetch('/joke');
                const data = await response.text();
                document.getElementById('joke').innerHTML = data;
            } catch (error) {
                document.getElementById('joke').innerHTML = "Error fetching joke.";
            }
        }

        // Load a joke automatically when page loads
        window.onload = getJoke;
    </script>
</body>
</html>
