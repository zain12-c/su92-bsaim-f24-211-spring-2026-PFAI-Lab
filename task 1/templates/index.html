<!DOCTYPE html>
<html>

<head>
    <title>Email Scraper</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        h2{
            margin-top: 40px;
            color: #333;
        }

        form{
            margin-top: 20px;
        }

        input[type="text"]{
            padding: 10px;
            width: 300px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        button{
            padding: 10px 20px;
            border: none;
            background: #007BFF;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover{
            background: #0056b3;
        }

        h3{
            margin-top: 30px;
            color: #444;
        }

        ul{
            list-style: none;
            padding: 0;
            max-width: 400px;
            margin: auto;
        }

        li{
            background: white;
            margin: 8px 0;
            padding: 10px;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>

</head>

<body>

    <h2>Email Scraper Tool</h2>

    <form method="POST">
        <input type="text" name="url" placeholder="Enter website URL" required>
        <button type="submit">Scrape Emails</button>
    </form>

    <h3>Emails Found:</h3>

    <ul>
        {% for email in emails %}
        <li>{{ email }}</li>
        {% endfor %}
    </ul>

</body>

</html>
